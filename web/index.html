  <style>
    @font-face {
      font-family: 'GameFont';
      src: url('assets/game/fonts/NotoSansSinhala-Regular.ttf') format('truetype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #689f38; /* Match the Phaser grass background — eliminates dark letterbox bars */
    }
    #flutter-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      overflow: hidden;
    }
    #web-splash {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('assets/game/images/loadingscreen.png');
      background-size: cover;
      background-position: center;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 22vh;
    }
    #web-splash-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.38);
      z-index: -1;
    }
    .splash-bar-container {
      width: 360px;
      height: 22px;
      background-color: #2C2520;
      border: 2px solid rgba(255, 179, 0, 0.9);
      border-radius: 6px;
      padding: 2px;
    }
    .splash-bar-fill {
      width: 0%;
      height: 100%;
      background-color: #D4AF37;
      border-radius: 4px;
      animation: fillBar 10s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
    }
    .splash-text {
      margin-top: 18px;
      color: #FFD700;
      font-family: 'Noto Sans Sinhala', sans-serif;
      font-size: 14px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    @keyframes fillBar {
      0% { width: 0%; }
      50% { width: 60%; }
      100% { width: 95%; }
    }
  </style>

<body>
  <div id="web-splash">
    <div id="web-splash-overlay"></div>
    <div class="splash-bar-container">
      <div class="splash-bar-fill" id="splash-fill"></div>
    </div>
    <div class="splash-text" id="splash-text">සම්පත් බාගත වෙමින් පවතින්නේ... 0%</div>
  </div>

  <div id="flutter-container">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="game_bridge.js?v=1.5.4"></script>
  </div>
  <script>
    let pct = 0;
    let splashInterval = setInterval(() => {
      pct += Math.floor(Math.random() * 3);
      if(pct > 95) pct = 95;
      document.getElementById('splash-text').innerText = 'සම්පත් බාගත වෙමින් පවතින්නේ... ' + pct + '%';
    }, 200);

    // Force Flutter to use HTML renderer to avoid WebGL context conflicts with Phaser
    window.addEventListener('load', function() {
      // Force immediate control and reload when new service worker found
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.addEventListener('updatefound', function() {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  window.location.reload();
                }
              });
            });
          }
        });
      }

      _flutter.loader.load({
        onEntrypointLoaded: async function(engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine({
            renderer: 'html'
          });
          
          clearInterval(splashInterval);
          document.getElementById('splash-fill').style.animation = 'none';
          document.getElementById('splash-fill').style.width = '100%';
          document.getElementById('splash-text').innerText = 'සම්පත් බාගත වෙමින් පවතින්නේ... 100%';
          
          setTimeout(async () => {
            document.getElementById('web-splash').style.opacity = '0';
            document.getElementById('web-splash').style.transition = 'opacity 0.4s ease-out';
            setTimeout(() => document.getElementById('web-splash').style.display = 'none', 400);
            await appRunner.runApp();
          }, 300);
        }
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
